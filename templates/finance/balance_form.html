{% extends 'base.html' %}{% block content %}<div class="page-head"><h1>Tambah Pos Neraca</h1></div><form method="post" class="cardx row g-3">{% csrf_token %}<div class="col-md-4"><label>Tanggal posisi</label><input required type="date" name="as_of_date" class="form-control"></div><div class="col-md-4"><label>Jenis akun</label><select required name="account_type" id="accountType" class="form-select">{% for v,l in account_types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></div><div class="col-md-4"><label>Kelompok</label><input required name="group" class="form-control" list="groups"><datalist id="groups">{% for v,l in asset_groups %}<option value="{{ v }}">{% endfor %}{% for v,l in liability_groups %}<option value="{{ v }}">{% endfor %}{% for v,l in equity_groups %}<option value="{{ v }}">{% endfor %}</datalist></div><div class="col-md-8"><label>Nama akun</label><input required name="account_name" class="form-control"></div><div class="col-md-4"><label>Saldo</label><input required name="amount" class="form-control" inputmode="decimal"></div><div class="col-12"><label>Catatan</label><textarea name="notes" class="form-control"></textarea></div><div><button class="btn btn-primary">Simpan</button></div></form>{% endblock %}
