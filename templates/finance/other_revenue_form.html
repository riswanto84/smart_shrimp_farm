{% extends 'base.html' %}{% block content %}<div class="page-head"><div><h1>Tambah Pendapatan Lain</h1></div></div><form method="post" class="cardx row g-3">{% csrf_token %}<div class="col-md-4"><label>Tanggal</label><input required type="date" name="date" class="form-control"></div><div class="col-md-4"><label>Nomor bukti</label><input name="document_number" class="form-control"></div><div class="col-md-4"><label>Jenis pendapatan</label><select name="revenue_type" class="form-select">{% for v,l in types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></div><div class="col-md-6"><label>Uraian</label><input required name="description" class="form-control"></div><div class="col-md-6"><label>Pelanggan</label><input name="customer" class="form-control"></div><div class="col-md-4"><label>Nilai bruto</label><input required name="gross_amount" class="form-control" inputmode="decimal"></div><div class="col-md-4"><label>Pajak/potongan</label><input name="tax_amount" value="0" class="form-control" inputmode="decimal"></div><div class="col-md-4"><label>Metode pembayaran</label><input name="payment_method" value="Transfer" class="form-control"></div><div class="col-12"><label>Catatan</label><textarea name="notes" class="form-control"></textarea></div><div class="col-12"><button class="btn btn-primary">Simpan</button></div></form>{% endblock %}
