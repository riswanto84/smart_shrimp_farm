{% extends 'base.html' %}{% load currency %}{% block content %}<div class="page-head"><div><h1>{{ title }}</h1><p>Isi nilai transaksi dan tanggal jatuh tempo.</p></div></div><div class="cardx"><form method="post">{% csrf_token %}<div class="row g-3"><div class="col-md-4"><label class="form-label">Tanggal transaksi *</label><input required type="date" name="transaction_date" class="form-control" value="{% if obj %}{{ obj.transaction_date|date:'Y-m-d' }}{% endif %}"></div><div class="col-md-4"><label class="form-label">Tanggal jatuh tempo *</label><input required type="date" name="due_date" class="form-control" value="{% if obj %}{{ obj.due_date|date:'Y-m-d' }}{% endif %}"></div><div class="col-md-4"><label class="form-label">Nomor dokumen</label><input name="document_number" class="form-control" value="{{ obj.document_number|default:'' }}" placeholder="Invoice/PO/Kwitansi"></div><div class="col-md-6"><label class="form-label">{{ partner_label }} *</label><input required name="partner_name" class="form-control" value="{{ obj.partner_name|default:'' }}"></div><div class="col-md-6"><label class="form-label">Nilai awal *</label><input required name="original_amount" class="form-control rupiah-input" inputmode="numeric" value="{% if obj %}{{ obj.original_amount|floatformat:0 }}{% endif %}"></div><div class="col-12"><label class="form-label">Uraian *</label><input required name="description" class="form-control" value="{{ obj.description|default:'' }}" placeholder="Penjualan udang kredit / pembelian pakan kredit"></div><div class="col-12"><label class="form-label">Catatan</label><textarea name="notes" class="form-control" rows="3">{{ obj.notes|default:'' }}</textarea></div><div class="col-12 d-flex gap-2"><button class="btn btn-primary">Simpan</button><a class="btn btn-outline-secondary" href="{% if account_type == 'receivable' %}{% url 'finance:receivables' %}{% else %}{% url 'finance:payables' %}{% endif %}">Batal</a></div></div></form></div>{% endblock %}
