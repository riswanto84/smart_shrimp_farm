{% extends 'base.html' %}{% block content %}<div class="page-head"><h1>{% if asset %}Edit{% else %}Tambah{% endif %} Aset Tetap</h1></div><form method="post" class="cardx row g-3">{% csrf_token %}<div class="col-md-3"><label>Kode aset</label><input required name="code" value="{{ asset.code|default:'' }}" class="form-control"></div><div class="col-md-5"><label>Nama aset</label><input required name="name" value="{{ asset.name|default:'' }}" class="form-control"></div><div class="col-md-4"><label>Kategori</label><input required name="category" value="{{ asset.category|default:'' }}" placeholder="Kincir, Pompa, Genset..." class="form-control"></div><div class="col-md-3"><label>Tanggal pembelian</label><input required type="date" name="acquisition_date" value="{{ asset.acquisition_date|date:'Y-m-d' }}" class="form-control"></div><div class="col-md-3"><label>Tanggal mulai digunakan</label><input required type="date" name="use_date" value="{{ asset.use_date|date:'Y-m-d' }}" class="form-control"></div><div class="col-md-3"><label>Harga perolehan</label><input required name="acquisition_cost" value="{{ asset.acquisition_cost|default:'0' }}" class="form-control" inputmode="decimal"></div><div class="col-md-3"><label>Biaya tambahan</label><input name="additional_cost" value="{{ asset.additional_cost|default:'0' }}" class="form-control" inputmode="decimal"></div><div class="col-md-3"><label>Nilai residu</label><input name="residual_value" value="{{ asset.residual_value|default:'0' }}" class="form-control" inputmode="decimal"></div><div class="col-md-3"><label>Masa manfaat komersial (tahun)</label><input type="number" min="1" name="commercial_useful_life_years" value="{{ asset.commercial_useful_life_years|default:'4' }}" class="form-control"></div><div class="col-md-3"><label>Kelompok fiskal</label><select name="fiscal_group" class="form-select">{% for v,l in groups %}<option value="{{ v }}" {% if asset.fiscal_group == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select></div><div class="col-md-3"><label>Status</label><select name="status" class="form-select">{% for v,l in statuses %}<option value="{{ v }}" {% if asset.status == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select></div><div class="col-md-4"><label>Lokasi</label><input name="location" value="{{ asset.location|default:'' }}" class="form-control"></div><div class="col-md-4"><label>Nomor bukti/faktur</label><input name="document_number" value="{{ asset.document_number|default:'' }}" class="form-control"></div><div class="col-md-4"><label>Sumber dana</label><input name="source_of_funds" value="{{ asset.source_of_funds|default:'' }}" class="form-control"></div><div class="col-12"><label>Catatan</label><textarea name="notes" class="form-control">{{ asset.notes|default:'' }}</textarea></div><div><button class="btn btn-primary">Simpan</button></div></form>{% endblock %}
