{% extends 'base.html' %}
{% block content %}<div class="page-head"><div><h1>Tambah Pengeluaran</h1><p>Upload bukti nota dan hubungkan biaya ke kolam tertentu bila diperlukan.</p></div></div><div class="cardx"><form method="post" enctype="multipart/form-data" class="row g-3">{% csrf_token %}<div class="col-md-4"><label class="form-label">Tanggal</label><input class="form-control" type="date" name="date" required></div><div class="col-md-4"><label class="form-label">Kategori</label><select class="form-select" name="category">{% for value,label in categories %}<option value="{{value}}">{{label}}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Kolam</label><select class="form-select" name="pond"><option value="">Semua Kolam</option>{% for p in ponds %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Nama Pengeluaran</label><input class="form-control" name="name" placeholder="Contoh: Pakan CP 30 sak" required></div><div class="col-md-3"><label class="form-label">Jumlah</label><input class="form-control" name="amount" inputmode="numeric" data-rupiah-input placeholder="Contoh: 15.000.000" required><div class="form-text">Format otomatis Rupiah, contoh Rp 15.000.000.</div></div><div class="col-md-3"><label class="form-label">Metode Bayar</label><select class="form-select" name="payment_method"><option>Cash</option><option>Transfer</option><option>QRIS</option></select></div><div class="col-md-6"><label class="form-label">Upload Bukti</label><input class="form-control" type="file" name="receipt"></div><div class="col-12"><label class="form-label">Catatan</label><textarea class="form-control" name="notes" rows="4"></textarea></div><div class="col-12"><button class="btn btn-primary">Simpan Pengeluaran</button></div></form></div>{% endblock %}
