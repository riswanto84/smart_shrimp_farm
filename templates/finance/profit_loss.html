{% extends 'base.html' %}
{% load currency %}
{% block content %}<div class="page-head"><div><h1>Laba Rugi</h1><p>Ringkasan pendapatan penjualan dikurangi pengeluaran operasional.</p></div></div><div class="cardx mb-3"><form method="get" class="row g-2 align-items-end"><div class="col-md-4"><label class="form-label">Tanggal Mulai</label><input class="form-control" type="date" name="date_from" value="{{ date_from|date:'Y-m-d' }}"></div><div class="col-md-4"><label class="form-label">Tanggal Selesai</label><input class="form-control" type="date" name="date_to" value="{{ date_to|date:'Y-m-d' }}"></div><div class="col-md-4 d-grid"><button class="btn btn-outline-primary">Terapkan Filter</button></div></form><div class="mt-3 d-flex gap-2"><a class="btn btn-success" href="{% url 'finance:export_profit_loss_excel' %}?{{ request.GET.urlencode }}">Export Excel</a><a class="btn btn-danger" href="{% url 'finance:export_profit_loss_pdf' %}?{{ request.GET.urlencode }}">Export PDF</a></div></div><div class="kpi-grid"><div class="kpi-card"><div class="kpi-icon blue"><i class="fa-solid fa-money-bill-trend-up"></i></div><div><span>Pendapatan</span><strong>{{ revenue|rupiah }}</strong></div></div><div class="kpi-card"><div class="kpi-icon gold"><i class="fa-solid fa-wallet"></i></div><div><span>Pengeluaran</span><strong>{{ expense_total|rupiah }}</strong></div></div><div class="kpi-card"><div class="kpi-icon green"><i class="fa-solid fa-chart-line"></i></div><div><span>Laba/Rugi</span><strong>{{ profit|rupiah }}</strong></div></div></div>{% endblock %}
