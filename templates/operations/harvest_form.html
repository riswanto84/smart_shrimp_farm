{% extends 'base.html' %}
{% block content %}<div class="page-head"><div><h1>Tambah Data Panen</h1><p>Catat hasil timbang panen parsial atau total.</p></div></div><div class="cardx"><form method="post" class="row g-3">{% csrf_token %}<div class="col-md-4"><label class="form-label">Tanggal</label><input class="form-control" type="date" name="date" required></div><div class="col-md-4"><label class="form-label">Kolam</label><select class="form-select" name="pond">{% for p in ponds %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Jenis Panen</label><select class="form-select" name="harvest_type"><option>Parsial</option><option>Total</option></select></div><div class="col-md-6"><label class="form-label">Size Udang / Keterangan Size</label><input class="form-control" name="size_text" placeholder="50 / 40-50 / Campur" required></div><div class="col-md-6"><label class="form-label">Total Kg</label><input class="form-control" name="total_kg" step="0.01" required></div><div class="col-12"><label class="form-label">Catatan</label><textarea class="form-control" name="notes" rows="4"></textarea></div><div class="col-12"><button class="btn btn-primary">Simpan Panen</button></div></form></div>{% endblock %}
