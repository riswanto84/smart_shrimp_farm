{% extends 'base.html' %}
{% block content %}<div class="page-head"><div><h1>{% if mode == 'edit' %}Edit{% else %}Tambah{% endif %} Data Panen</h1><p>Catat hasil timbang panen parsial atau total.</p></div></div><div class="cardx"><form method="post" class="row g-3">{% csrf_token %}<div class="col-md-4"><label class="form-label">Tanggal</label><input class="form-control" type="date" name="date" value="{{ obj.date|date:'Y-m-d' }}" required></div><div class="col-md-4"><label class="form-label">Kolam</label><select class="form-select" name="pond">{% for p in ponds %}<option value="{{p.id}}" {% if obj.pond_id == p.id %}selected{% endif %}>{{p.name}}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Jenis Panen</label><select class="form-select" name="harvest_type"><option {% if obj.harvest_type == 'Parsial' %}selected{% endif %}>Parsial</option><option {% if obj.harvest_type == 'Total' %}selected{% endif %}>Total</option></select></div><div class="col-md-6"><label class="form-label">Size Udang / Keterangan Size</label><input class="form-control" name="size_text" value="{{ obj.size_text|default:'' }}" placeholder="50 / 40-50 / Campur" required></div><div class="col-md-6"><label class="form-label">Total Kg</label><input class="form-control" name="total_kg" step="0.01" value="{{ obj.total_kg|default:'' }}" required></div><div class="col-12"><label class="form-label">Catatan</label><textarea class="form-control" name="notes" rows="4">{{ obj.notes|default:'' }}</textarea></div><div class="col-12 d-flex gap-2"><button class="btn btn-primary">Simpan Panen</button><a class="btn btn-outline-secondary" href="{% url 'operations:harvests' %}">Batal</a></div></form></div>{% endblock %}
