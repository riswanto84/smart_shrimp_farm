<div class="d-inline-flex gap-1" role="group" aria-label="Aksi data">
{% if detail_url %}<a class="btn btn-sm btn-outline-primary" href="{{ detail_url }}"><i class="fa-solid fa-eye"></i></a>{% endif %}
{% if not cycle_is_locked %}
{% if edit_url %}<a class="btn btn-sm btn-warning text-dark" href="{{ edit_url }}"><i class="fa-solid fa-pen-to-square"></i></a>{% endif %}
{% if delete_url %}<form method="post" action="{{ delete_url }}" class="d-inline" onsubmit="return confirm('Hapus data ini? Tindakan ini tidak dapat dibatalkan.');">{% csrf_token %}<button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-trash"></i></button></form>{% endif %}
{% endif %}
</div>
