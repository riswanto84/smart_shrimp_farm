<div class="d-flex gap-2 flex-wrap justify-content-end">
  {% if detail_url %}<a class="btn btn-sm btn-outline-primary icon-action-btn" href="{{ detail_url }}" title="Detail" aria-label="Detail"><i class="fa-solid fa-eye"></i></a>{% endif %}
  <a class="btn btn-sm btn-warning text-dark icon-action-btn" href="{{ edit_url }}" title="Edit" aria-label="Edit"><i class="fa-solid fa-pen-to-square"></i></a>
  <form method="post" action="{{ delete_url }}" onsubmit="return confirm('Hapus data ini? Tindakan ini tidak dapat dibatalkan.');">
    {% csrf_token %}
    <button class="btn btn-sm btn-outline-danger icon-action-btn" type="submit" title="Hapus" aria-label="Hapus"><i class="fa-solid fa-trash"></i></button>
  </form>
</div>
