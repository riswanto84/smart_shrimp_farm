{% extends 'base.html' %}
{% block content %}
<div class="page-head"><div><h1>Input Parameter Harian</h1><p>Form mobile-first untuk teknisi tambak mencatat kondisi kolam harian.</p></div></div>
<div class="cardx"><form method="post" class="row g-3">{% csrf_token %}<div class="col-md-4"><label class="form-label">Tanggal</label><input class="form-control" type="date" name="date" required></div><div class="col-md-4"><label class="form-label">Kolam</label><select class="form-select" name="pond">{% for p in ponds %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">DOC</label><input class="form-control" name="doc" type="number" value="0"></div><div class="col-md-3"><label class="form-label">Suhu Air (°C)</label><input class="form-control" name="temperature" step="0.01"></div><div class="col-md-3"><label class="form-label">pH Pagi</label><input class="form-control" name="ph_morning" step="0.01"></div><div class="col-md-3"><label class="form-label">pH Sore</label><input class="form-control" name="ph_evening" step="0.01"></div><div class="col-md-3"><label class="form-label">DO Pagi</label><input class="form-control" name="do_morning" step="0.01"></div><div class="col-md-3"><label class="form-label">DO Malam</label><input class="form-control" name="do_night" step="0.01"></div><div class="col-md-3"><label class="form-label">Salinitas</label><input class="form-control" name="salinity" step="0.01"></div><div class="col-md-3"><label class="form-label">Alkalinitas</label><input class="form-control" name="alkalinity" step="0.01"></div><div class="col-md-3"><label class="form-label">Kecerahan (cm)</label><input class="form-control" name="transparency" step="0.01"></div><div class="col-md-3"><label class="form-label">Pakan Harian (kg)</label><input class="form-control" name="feed_kg" step="0.01" value="0"></div><div class="col-md-3"><label class="form-label">Mortalitas</label><input class="form-control" name="mortality" type="number" value="0"></div><div class="col-md-6"><label class="form-label">Warna Air</label><input class="form-control" name="water_color" placeholder="Hijau kecoklatan"></div><div class="col-12"><label class="form-label">Catatan</label><textarea class="form-control" name="notes" rows="4"></textarea></div><div class="col-12 d-flex gap-2 flex-wrap"><button class="btn btn-primary" name="save">Simpan Parameter</button><button class="btn btn-success" name="analyse"><i class="fa-solid fa-robot"></i> Simpan & Analisa Ollama</button></div></form></div>
{% endblock %}
