{% extends 'base.html' %}
{% block content %}
<div class="page-head"><div><h1>Form Master Kolam</h1><p>Tambah atau ubah data kolam tambak Udang Emas Nusantara.</p></div></div>
<div class="cardx"><form method="post" enctype="multipart/form-data" class="row g-3">{% csrf_token %}<div class="col-md-4"><label class="form-label">Kode Kolam</label><input class="form-control" name="code" value="{{pond.code|default:''}}" required></div><div class="col-md-4"><label class="form-label">Nama Kolam</label><input class="form-control" name="name" value="{{pond.name|default:''}}" required></div><div class="col-md-4"><label class="form-label">Status</label><select class="form-select" name="status"><option>Persiapan</option><option>Budidaya</option><option>Panen</option><option>Kosong</option><option>Perbaikan</option></select></div><div class="col-md-3"><label class="form-label">Luas (m²)</label><input class="form-control" name="area_m2" value="{{pond.area_m2|default:''}}"></div><div class="col-md-3"><label class="form-label">Kedalaman (m)</label><input class="form-control" name="depth_m" value="{{pond.depth_m|default:''}}"></div><div class="col-md-3"><label class="form-label">Kapasitas Tebar</label><input class="form-control" name="capacity_seed" value="{{pond.capacity_seed|default:''}}"></div><div class="col-md-3"><label class="form-label">Jenis Kolam</label><input class="form-control" name="pond_type" value="{{pond.pond_type|default:'HDPE'}}"></div><div class="col-md-6"><label class="form-label">Lokasi</label><input class="form-control" name="location" value="{{pond.location|default:''}}"></div><div class="col-md-6"><label class="form-label">Foto Kolam</label><input class="form-control" type="file" name="photo"></div><div class="col-12"><label class="form-label">Keterangan</label><textarea class="form-control" rows="4" name="notes">{{pond.notes|default:''}}</textarea></div><div class="col-12"><button class="btn btn-primary px-4">Simpan Data Kolam</button></div></form></div>
{% endblock %}
